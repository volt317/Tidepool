# CodeQL security analysis over the whole TypeScript/JavaScript tree
# (server, shared, web, scripts) with the security-and-quality query suite.
# Interpreted language, so build-mode none — no compilation step needed for
# extraction. Runs on pushes, PRs, and a weekly schedule so newly published
# queries re-scan the unchanged codebase.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "31 6 * * 1"

permissions:
  contents: read

# JavaScript-based Actions run on the Node 24 runtime where supported.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: verify .node-version is present
        run: |
          if [ ! -f .node-version ]; then
            echo "::error::.node-version is missing from the checked-out tree. It is the single source of truth for the CI Node version and MUST be committed alongside the workflows that reference it (node-version-file). Ensure .node-version is tracked: git add .node-version && commit."
            exit 1
          fi
          echo "Node version pinned to $(cat .node-version) via .node-version"

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version

      - name: verify Node 24 runtime
        run: node scripts/assert-node24.mjs

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
