# .github/workflows/deploy.yml
#
# The INTEGRATED deployment scenario: the containerized equivalent of the
# live collector smoke. Builds the real images, runs the real four-container
# topology, performs a bounded live collection, proves the replica/read
# path and collector-stopped availability, runs the NEGATIVE boundary
# suite, snapshots, dispatches offline, and round-trips a verified backup →
# clean-corpus restore → snapshot digest comparison. See
# deploy/scripts/ci-deploy-test.sh for the 19 numbered steps.
#
# Per-change gating is .github/workflows/appliance.yml (each invariant as
# its own named step); this workflow runs the end-to-end scenario weekly —
# catching upstream base-image and registry drift the way the collector
# smoke catches upstream format drift — and on demand.
name: deploy
on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

# JavaScript-based Actions run on the Node 24 runtime where supported.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: verify .node-version is present
        run: |
          if [ ! -f .node-version ]; then
            echo "::error::.node-version is missing from the checked-out tree. It is the single source of truth for the CI Node version and MUST be committed alongside the workflows that reference it (node-version-file). Ensure .node-version is tracked: git add .node-version && commit."
            exit 1
          fi
          echo "Node version pinned to $(cat .node-version) via .node-version"

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version

      - name: verify Node 24 runtime
        run: node scripts/assert-node24.mjs

      - name: install host tooling (podman, apparmor, shellcheck)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman apparmor apparmor-utils shellcheck
          podman info --format 'podman {{.Version.Version}} rootless={{.Host.Security.Rootless}}'

      - name: verify required npm scripts are present (clear error on drift)
        run: node scripts/assert-scripts-present.mjs check:deploy-config check:locks

      - name: verify generated deploy config is in sync with deploy/deploy.yaml
        run: npm run check:deploy-config

      - name: verify component locks are in sync with the workspace
        run: npm run check:locks

      - name: run the 19-step deployment scenario
        run: ./deploy/scripts/ci-deploy-test.sh

      - name: upload boundary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boundary-report
          path: /tmp/**/boundaries.json
          if-no-files-found: ignore
