# Linting gate: ESLint (flat config, typescript-eslint + react-hooks) and the
# TypeScript compiler across server, shared, and web. Both must be clean —
# these are the same `npm run lint` / `npm run typecheck` gates documented in
# the README, so CI and a local checkout can never disagree about "clean".
name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# JavaScript-based Actions run on the Node 24 runtime where supported.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: eslint + typecheck (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: verify .node-version is present
        run: |
          if [ ! -f .node-version ]; then
            echo "::error::.node-version is missing from the checked-out tree. It is the single source of truth for the CI Node version and MUST be committed alongside the workflows that reference it (node-version-file). Ensure .node-version is tracked: git add .node-version && commit."
            exit 1
          fi
          echo "Node version pinned to $(cat .node-version) via .node-version"

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            web/package-lock.json


      - name: verify Node 24 runtime
        run: node scripts/assert-node24.mjs
      - name: Install (root tooling, server, web)
        run: |
          npm ci   # workspace root install: server + web, hoisted, one lock

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

  shellcheck:
    name: shellcheck (deploy + repo scripts)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck --version

      - name: shellcheck all shell scripts
        run: shellcheck -S warning -x deploy/scripts/*.sh deploy/scripts/lib/*.sh scripts/*.sh
