# Linting gate: ESLint (flat config, typescript-eslint + react-hooks) and the
# TypeScript compiler across server, shared, and web. Both must be clean —
# these are the same `npm run lint` / `npm run typecheck` gates documented in
# the README, so CI and a local checkout can never disagree about "clean".
name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: eslint + typecheck (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            web/package-lock.json

      - name: Install (root tooling, server, web)
        run: |
          npm ci   # workspace root install: server + web, hoisted, one lock

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck
