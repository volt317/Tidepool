# .github/workflows/structure.yml
#
# The SLIM per-change appliance gate: the cheap STRUCTURAL invariants only —
# no image builds, no live containers. It restores per-PR coverage of the
# invariants that appliance.yml used to gate before it was removed for scope
# reasons; the heavy integrated scenario (real images, live topology,
# backup/restore round-trip) remains weekly/on-demand in deploy.yml.
#
# Step ↔ requirement map:
#   check generated deployment config   → check:deploy-config drift gate
#   check component lock drift          → check:locks drift gate
#   structural verification             → deploy/scripts/verify-render.sh:
#       templates render with zero surviving placeholders and no :latest,
#       quadlet generator dry-run, rendered tidepool.nft passes nft -c,
#       every AppArmor profile parses with apparmor_parser -Q
name: structure

on:
  push:
    branches: [main]
    paths: ["deploy/**", "shared/**", "scripts/**", "package*.json", ".node-version", ".github/workflows/structure.yml"]
  pull_request:
    paths: ["deploy/**", "shared/**", "scripts/**", "package*.json", ".node-version", ".github/workflows/structure.yml"]
  workflow_dispatch:

permissions:
  contents: read

# JavaScript-based Actions run on the Node 24 runtime where supported.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  structure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: verify .node-version is present
        run: |
          if [ ! -f .node-version ]; then
            echo "::error::.node-version is missing from the checked-out tree. It is the single source of truth for the CI Node version and MUST be committed alongside the workflows that reference it (node-version-file). Ensure .node-version is tracked: git add .node-version && commit."
            exit 1
          fi
          echo "Node version pinned to $(cat .node-version) via .node-version"

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            web/package-lock.json

      - name: verify Node 24 runtime
        run: node scripts/assert-node24.mjs

      - name: preflight — required npm scripts exist
        run: node scripts/assert-scripts-present.mjs check:deploy-config check:locks

      - name: install host tooling (nftables, apparmor parser, podman for quadlet dry-run)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nftables apparmor-utils podman

      - name: install (workspace root)
        run: npm ci

      - name: check generated deployment config (deploy.yaml ↔ deployConfig.generated.ts)
        run: npm run check:deploy-config

      - name: check component lock drift (workspace root lock ↔ standalone locks)
        run: npm run check:locks

      - name: structural verification (render + nftables + apparmor parse)
        run: ./deploy/scripts/verify-render.sh
