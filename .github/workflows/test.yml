# Unit tests + coverage: node:test with native V8 coverage (no test-framework
# dependency, matching the project's zero-dep ethos). Thresholds are enforced
# by the runner itself (lines 65 / branches 70 / functions 68 — set just
# below achieved so regressions fail); the lcov report is uploaded as an
# artifact. Network collectors sit intentionally below these numbers — their
# coverage comes from the live runtime smoke in build.yml, not unit tests.
name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# JavaScript-based Actions run on the Node 24 runtime where supported.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: unit tests + coverage (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: verify .node-version is present
        run: |
          if [ ! -f .node-version ]; then
            echo "::error::.node-version is missing from the checked-out tree. It is the single source of truth for the CI Node version and MUST be committed alongside the workflows that reference it (node-version-file). Ensure .node-version is tracked: git add .node-version && commit."
            exit 1
          fi
          echo "Node version pinned to $(cat .node-version) via .node-version"

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json


      - name: verify Node 24 runtime
        run: node scripts/assert-node24.mjs
      - name: Install
        run: |
          npm ci   # workspace root install: server + web, hoisted, one lock

      - name: Tests with coverage thresholds
        run: npm run test:coverage

      - name: Upload lcov
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14
